<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어반벤치빌딩 추가 냉난방 신청</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root{
  --bg:#f5f5f7;--white:#ffffff;--gray1:#f0f0f2;--gray2:#e4e4e8;--gray3:#b0b0bc;
  --black:#111111;--black2:#222222;--black3:#444444;
  --red:#dc2626;--green:#16a34a;--border:#e0e0e6;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shadow2:0 2px 8px rgba(0,0,0,.08),0 12px 32px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--black);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.hi{max-width:680px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:14px;}
.logo{width:38px;height:38px;background:var(--black);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;color:#fff;}
.ht{font-size:20px;font-weight:800;letter-spacing:-.6px;color:var(--black);}
main{max-width:680px;margin:28px auto 60px;padding:0 24px;}
.panel{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:12px;box-shadow:var(--shadow);}
.panel.ap{border-color:var(--black);box-shadow:var(--shadow2);}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.pn{width:24px;height:24px;border-radius:50%;background:var(--black);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.pt{font-size:17px;font-weight:700;letter-spacing:-.4px;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
.fl{font-size:14px;font-weight:700;color:var(--black);}
.fi{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--black);font-size:14px;font-family:'Pretendard',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;}
.fi:focus{border-color:var(--black);box-shadow:0 0 0 3px rgba(0,0,0,.07);}
.fi::placeholder{color:var(--gray3);}
.notice{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;font-size:14px;color:#92400e;line-height:1.8;}
.notice-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
@media(max-width:560px){.notice-row{grid-template-columns:1fr;}}
.notice-wd{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;font-size:13px;color:#1d4ed8;line-height:1.7;}
.notice-we{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;padding:12px 14px;font-size:13px;color:#6d28d9;line-height:1.7;}
.notice-wd strong,.notice-we strong{font-weight:700;}
.floor-group{display:flex;gap:8px;flex-wrap:wrap;}
.floor-btn{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:9px 20px;font-size:14px;font-weight:600;color:var(--gray3);cursor:pointer;transition:all .15s;font-family:'Pretendard',sans-serif;}
.floor-btn:hover{border-color:var(--black3);color:var(--black3);}
.floor-btn.sel{border-color:var(--black);background:var(--black);color:#fff;}

/* 통합 달력 */
.cal-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:18px;user-select:none;-webkit-user-select:none;margin-top:4px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav{background:none;border:1.5px solid var(--border);border-radius:7px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--black3);flex-shrink:0;}
.cal-nav:hover{border-color:var(--black);color:var(--black);}
.cal-title{font-size:15px;font-weight:700;color:var(--black);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dh{font-size:11px;font-weight:700;text-align:center;padding:6px 0;color:var(--gray3);}
.cal-dh:first-child{color:#dc2626;}
.cal-dh:last-child{color:#2563eb;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;border-radius:7px;cursor:pointer;transition:background .1s;position:relative;}
.cal-day:not(.disabled):not(.empty):hover{background:var(--gray1);}
/* 평일 선택 — 검정 */
.cal-day.sel-wd{background:var(--black);color:#fff;font-weight:700;}
/* 주말 선택 — 남색 계열 */
.cal-day.sel-we{background:#4f46e5;color:#fff;font-weight:700;}
.cal-day.in-range{background:var(--gray2);}
.cal-day.disabled{color:var(--gray2);cursor:default;}
.cal-day.empty{cursor:default;}
.cal-day.sun{color:#dc2626;}
.cal-day.sat{color:#2563eb;}
.cal-day.sun.disabled,.cal-day.sat.disabled{color:var(--gray2);}
.cal-day.sel-wd.sun,.cal-day.sel-wd.sat,
.cal-day.sel-we.sun,.cal-day.sel-we.sat{color:#fff;}
.cal-day.in-range.sun{color:#dc2626;}
.cal-day.in-range.sat{color:#2563eb;}
/* 범례 */
.cal-legend{display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--black3);}
.leg-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle;}

/* 날짜 현황 */
.selected-panel{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:12px;box-shadow:var(--shadow);}
.sel-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sel-count{font-size:12px;font-weight:600;background:var(--black);color:#fff;border-radius:20px;padding:2px 9px;}
.date-tags{display:flex;flex-wrap:wrap;gap:6px;}
.date-tag{display:inline-flex;align-items:center;gap:5px;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:600;}
.date-tag.weekday{background:#e0e7ff;border:1px solid #c7d2fe;color:#3730a3;}
.date-tag.weekend{background:#ede9fe;border:1px solid #ddd6fe;color:#5b21b6;}
.date-tag-rm{background:none;border:none;cursor:pointer;color:var(--gray3);font-size:13px;padding:0;line-height:1;}
.date-tag-rm:hover{color:var(--red);}
.empty-msg{font-size:13px;color:var(--gray3);padding:4px 0;}

/* 신청 버튼 */
.btn-submit{background:var(--black);border:none;border-radius:10px;padding:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Pretendard',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;}
.btn-submit:hover{background:var(--black2);box-shadow:0 4px 16px rgba(0,0,0,.2);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;display:none;}
.btn-submit.loading .spin{display:block;}
@keyframes sp{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:24px;right:24px;background:var(--black);border-radius:10px;padding:12px 18px;color:#fff;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.22,.68,0,1.2);z-index:999;max-width:320px;font-family:'Pretendard',sans-serif;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.err{background:var(--red);}
#toast.ok{background:var(--green);}
#loadingOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9000;align-items:center;justify-content:center;}
.loading-box{background:#fff;border-radius:16px;padding:32px 40px;text-align:center;}
.loading-spin{width:28px;height:28px;border:3px solid var(--gray2);border-top-color:var(--black);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 14px;}
@media(max-width:600px){main,.hi{padding-left:16px;padding-right:16px;}.panel,.selected-panel{padding:18px 16px;}}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div class="logo">❄️</div>
    <div><div class="ht">어반벤치빌딩 추가 냉난방 신청</div></div>
  </div>
</header>
<main>

<!-- 안내 -->
<div class="panel">
  <div class="ph"><div class="pn">ℹ</div><div class="pt">신청 안내</div></div>
  <div class="notice">
    ❄ <strong>냉방</strong>은 <strong>하절기(5월 ~ 8월)</strong>, 🔥 <strong>난방</strong>은 <strong>동절기(11월 ~ 3월)</strong>에만 신청이 가능합니다.<br>
    해당 기간 외에는 추가 냉난방 운영이 불가하오니 양해 부탁드립니다.
  </div>
</div>

<!-- 입력 -->
<div class="panel ap">
  <div class="ph"><div class="pn">1</div><div class="pt">신청 정보 입력</div></div>
  <div class="fg">
    <label class="fl">신청 목적</label>
    <input class="fi" id="purpose" placeholder="신청 목적을 입력해주세요"/>
  </div>
  <div class="fg">
    <label class="fl">신청 기안</label>
    <input class="fi" id="drafter"/>
  </div>
  <div class="fg" style="margin-bottom:0;">
    <div class="fl" style="margin-bottom:10px;">신청 층수</div>
    <div class="floor-group">
      <button class="floor-btn" onclick="selFloor(this,'5')">5층</button>
      <button class="floor-btn" onclick="selFloor(this,'6')">6층</button>
      <button class="floor-btn" onclick="selFloor(this,'7')">7층</button>
      <button class="floor-btn" onclick="selFloor(this,'8')">8층</button>
    </div>
  </div>
</div>

<!-- 날짜 선택 -->
<div class="panel ap">
  <div class="ph"><div class="pn">2</div><div class="pt">날짜 선택</div></div>

  <!-- 평일/주말 안내 나란히 -->
  <div class="notice-row">
    <div class="notice-wd">📅 <strong>평일</strong><br>오후 7시 ~ 오후 10시</div>
    <div class="notice-we">📅 <strong>주말</strong><br>오전 9시 ~ 오후 10시</div>
  </div>

  <!-- 통합 달력 -->
  <div class="cal-wrap" id="calMain"></div>
  <div class="cal-legend">
    <span><span class="leg-dot" style="background:var(--black);"></span>평일 선택</span>
    <span><span class="leg-dot" style="background:#4f46e5;"></span>주말 선택</span>
    <span style="color:var(--gray3);">클릭 또는 드래그로 선택·해제</span>
  </div>
</div>

<!-- 선택된 날짜 현황 -->
<div class="selected-panel">
  <div class="sel-title">📋 신청 날짜 현황 <span class="sel-count" id="totalCount">0</span></div>
  <div class="date-tags" id="allDateTags"><div class="empty-msg">선택된 날짜가 없습니다.</div></div>
</div>

<!-- 신청 버튼 -->
<div class="panel" style="padding:20px 24px;">
  <button class="btn-submit" id="btnSubmit" onclick="doSubmit()">
    <div class="spin"></div><span class="btn-text">신청하기</span>
  </button>
</div>

</main>
<div id="toast"></div>
<div id="loadingOverlay">
  <div class="loading-box">
    <div class="loading-spin"></div>
    <div style="font-size:15px;font-weight:700;">라크에 입력 중...</div>
    <div style="font-size:12px;color:var(--gray3);margin-top:4px;">잠시만 기다려 주세요</div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwpS7JCiIGBys2USZEpXnoVz9ZZ2V87WhYokvghWZRh1n-FK3jd5ofyyIpmJRRyYtgPgA/exec';

var state = {
  floor: '',
  weekdayDates: [],  // 평일
  weekendDates: [],  // 주말
  calYear: 0, calMonth: 0
};
var today = new Date();
state.calYear  = today.getFullYear();
state.calMonth = today.getMonth();

// 드래그 상태
var drag = { active:false, startDate:null, lastDate:null, isDeselect:false, deselType:'' };

/* 층수 */
function selFloor(el, floor){
  document.querySelectorAll('.floor-btn').forEach(function(b){b.classList.remove('sel');});
  el.classList.add('sel'); state.floor = floor;
}

/* 날짜가 평일인지 주말인지 */
function getDateType(ds){
  var dow = new Date(+ds.split('-')[0], +ds.split('-')[1]-1, +ds.split('-')[2]).getDay();
  return (dow===0||dow===6) ? 'weekend' : 'weekday';
}
function isSelected(ds){
  var t = getDateType(ds);
  var arr = t==='weekday' ? state.weekdayDates : state.weekendDates;
  return arr.indexOf(ds) >= 0;
}
function toggleDate(ds){
  var t = getDateType(ds);
  var arr = t==='weekday' ? state.weekdayDates : state.weekendDates;
  var idx = arr.indexOf(ds);
  if(idx>=0) arr.splice(idx,1); else { arr.push(ds); arr.sort(); }
}
function selectDate(ds){
  var t = getDateType(ds);
  var arr = t==='weekday' ? state.weekdayDates : state.weekendDates;
  if(arr.indexOf(ds)<0){ arr.push(ds); arr.sort(); }
}
function deselectDate(ds){
  var t = getDateType(ds);
  var arr = t==='weekday' ? state.weekdayDates : state.weekendDates;
  var idx = arr.indexOf(ds); if(idx>=0) arr.splice(idx,1);
}

/* ── 달력 렌더 ── */
function renderCal(){
  var y=state.calYear, m=state.calMonth;
  var firstDay=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var todayStr=fmt(today);

  var h='<div class="cal-header">';
  h+='<button class="cal-nav" onmousedown="event.stopPropagation()" onclick="moveCal(-1)">&#8249;</button>';
  h+='<span class="cal-title">'+y+'년 '+mn[m]+'</span>';
  h+='<button class="cal-nav" onmousedown="event.stopPropagation()" onclick="moveCal(1)">&#8250;</button>';
  h+='</div><div class="cal-grid">';
  var dn=['일','월','화','수','목','금','토'];
  for(var d=0;d<7;d++) h+='<div class="cal-dh">'+dn[d]+'</div>';
  for(var e=0;e<firstDay;e++) h+='<div class="cal-day empty"></div>';

  for(var i=1;i<=dim;i++){
    var dt=new Date(y,m,i), dow=dt.getDay(), ds=fmt(dt);
    var isPast = ds < todayStr;
    var cls='cal-day';
    if(dow===0) cls+=' sun';
    if(dow===6) cls+=' sat';
    if(isPast){ h+='<div class="'+cls+' disabled">'+i+'</div>'; continue; }

    var sel = isSelected(ds);
    var isWE = (dow===0||dow===6);
    if(sel) cls += isWE ? ' sel-we' : ' sel-wd';

    h+='<div class="'+cls+'" data-date="'+ds+'"'
      +' onmousedown="onMD(event,\''+ds+'\')"'
      +' onmouseenter="onME(event,\''+ds+'\')"'
      +' onmouseup="onMU(event,\''+ds+'\')"'
      +'>'+i+'</div>';
  }
  h+='</div>';
  document.getElementById('calMain').innerHTML=h;
}

function moveCal(dir){
  state.calMonth+=dir;
  if(state.calMonth<0){state.calMonth=11;state.calYear--;}
  if(state.calMonth>11){state.calMonth=0;state.calYear++;}
  renderCal();
}

/* ── 드래그 ── */
function onMD(e,ds){
  e.preventDefault();
  drag.active=true; drag.startDate=ds; drag.lastDate=ds;
  drag.isDeselect=isSelected(ds);
  // 해제 드래그일 때 타입 기억 (평일/주말 혼합 드래그 대응)
  drag.deselType = drag.isDeselect ? getDateType(ds) : '';
}
function onME(e,ds){
  if(!drag.active) return;
  drag.lastDate=ds; applyPreview();
}
function onMU(e,ds){
  if(!drag.active) return;
  drag.lastDate=ds; commitDrag(); drag.active=false;
}
document.addEventListener('mouseup',function(){
  if(drag.active){ commitDrag(); drag.active=false; }
});

function applyPreview(){
  var s=drag.startDate<drag.lastDate?drag.startDate:drag.lastDate;
  var end=drag.startDate<drag.lastDate?drag.lastDate:drag.startDate;
  document.querySelectorAll('#calMain .cal-day[data-date]').forEach(function(c){
    var d=c.getAttribute('data-date');
    var isWE=(new Date(+d.split('-')[0],+d.split('-')[1]-1,+d.split('-')[2]).getDay());
    isWE=(isWE===0||isWE===6);
    c.classList.remove('in-range','sel-wd','sel-we');
    if(d>=s&&d<=end){
      if(drag.isDeselect){ /* 선택 해제 미리보기 — 클래스 없음 */ }
      else{ if(!isSelected(d)) c.classList.add('in-range'); else c.classList.add(isWE?'sel-we':'sel-wd'); }
    } else {
      if(isSelected(d)) c.classList.add(isWE?'sel-we':'sel-wd');
    }
  });
}

function commitDrag(){
  var s=drag.startDate<drag.lastDate?drag.startDate:drag.lastDate;
  var end=drag.startDate<drag.lastDate?drag.lastDate:drag.startDate;
  var todayStr=fmt(today);
  var cur=new Date(+s.split('-')[0],+s.split('-')[1]-1,+s.split('-')[2]);
  var endD=new Date(+end.split('-')[0],+end.split('-')[1]-1,+end.split('-')[2]);
  while(cur<=endD){
    var ds=fmt(cur);
    if(ds>=todayStr){
      if(drag.isDeselect) deselectDate(ds);
      else selectDate(ds);
    }
    cur.setDate(cur.getDate()+1);
  }
  state.weekdayDates.sort(); state.weekendDates.sort();
  renderCal(); renderAllTags();
}

/* ── 태그 ── */
function renderAllTags(){
  var all=[];
  state.weekdayDates.forEach(function(d){all.push({date:d,type:'weekday'});});
  state.weekendDates.forEach(function(d){all.push({date:d,type:'weekend'});});
  all.sort(function(a,b){return a.date<b.date?-1:1;});
  document.getElementById('totalCount').textContent=all.length;
  var el=document.getElementById('allDateTags');
  if(!all.length){el.innerHTML='<div class="empty-msg">선택된 날짜가 없습니다.</div>';return;}
  var h='';
  all.forEach(function(item){
    var label=item.type==='weekday'?'평일':'주말';
    h+='<div class="date-tag '+item.type+'">'+fmtKr(item.date)
      +' <span style="opacity:.7;font-size:11px;">'+label+'</span>'
      +'<button class="date-tag-rm" onclick="removeDate(\''+item.date+'\')">✕</button></div>';
  });
  el.innerHTML=h;
}
function removeDate(ds){
  deselectDate(ds); renderCal(); renderAllTags();
}

/* ── GAS 중계 → 라크 API ── */
async function submitToLark(rows){
  var res=await fetch(GAS_URL, {
    method:'POST',
    body:JSON.stringify(rows)
  });
  var data=await res.json();
  if(!data.success) throw new Error(data.message || '저장 실패');
  return data;
}

/* ── 신청 ── */
async function doSubmit(){
  var purpose=document.getElementById('purpose').value.trim();
  var drafter=document.getElementById('drafter').value.trim();
  if(!purpose){toast('신청 목적을 입력해주세요','err');return;}
  if(!drafter){toast('신청 기안을 입력해주세요','err');return;}
  if(!state.floor){toast('신청 층수를 선택해주세요','err');return;}
  var allDates=[];
  state.weekdayDates.forEach(function(d){allDates.push({date:d,type:'평일'});});
  state.weekendDates.forEach(function(d){allDates.push({date:d,type:'주말'});});
  allDates.sort(function(a,b){return a.date<b.date?-1:1;});
  if(!allDates.length){toast('날짜를 한 개 이상 선택해주세요','err');return;}
  var rows=allDates.map(function(item){
    return{purpose:purpose,drafter:drafter,floor:state.floor+'층',type:item.type,date:fmtKr(item.date)};
  });
  var btn=document.getElementById('btnSubmit');
  btn.disabled=true; btn.classList.add('loading');
  document.getElementById('loadingOverlay').style.display='flex';
  try{
    await submitToLark(rows);
    document.getElementById('loadingOverlay').style.display='none';
    btn.disabled=false; btn.classList.remove('loading');
    toast('✅ '+rows.length+'건 신청 완료!','ok');
    state.weekdayDates=[]; state.weekendDates=[]; state.floor='';
    document.getElementById('purpose').value='';
    document.getElementById('drafter').value='';
    document.querySelectorAll('.floor-btn').forEach(function(b){b.classList.remove('sel');});
    renderCal(); renderAllTags();
  }catch(err){
    document.getElementById('loadingOverlay').style.display='none';
    btn.disabled=false; btn.classList.remove('loading');
    toast('오류: '+err.message,'err'); console.error(err);
  }
}

/* ── 유틸 ── */
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtKr(s){
  var p=s.split('-'), dow=new Date(+p[0],+p[1]-1,+p[2]).getDay();
  return p[0]+'년 '+p[1]+'월 '+p[2]+'일(['+'일월화수목금토'[dow]+')';
}
function toast(msg,t){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+(t||'');
  clearTimeout(el._t); el._t=setTimeout(function(){el.className='';},3200);
}

renderCal();
</script>
